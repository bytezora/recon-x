name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Download modules
        run: go mod download
      - name: Build
        run: go build -ldflags "-X 'main.version=$(git describe --tags --always --dirty)'" -v ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -timeout 120s ./...