name: Feature request
description: Suggest an improvement for recon-x
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should recon-x do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and scope
      description: Any authorization, rate limit, payload safety or false-positive concerns?
